name: Docker Base Image

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  # DOCKERHUB_NAMESPACE comes from a repository variable (not a secret) so it is
  # available in Dependabot PR runs where secrets are not injected.
  BASE_IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/synctexng-rmq-server-base
  TARGET_PLATFORMS: linux/amd64 #,linux/arm64,linux/arm/v7

jobs:
  docker-base:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Compute base image SHA
        id: base_sha
        run: |
          sha=$(git log -1 --format='%h' -- Dockerfile.base)
          if [ -z "$sha" ]; then
            echo "ERROR: Could not determine commit SHA for Dockerfile.base" >&2
            exit 1
          fi
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Validate DockerHub namespace
        run: |
          if [ -z "${{ vars.DOCKERHUB_NAMESPACE }}" ]; then
            echo "ERROR: DOCKERHUB_NAMESPACE repository variable is not set." >&2
            echo "Set it under Settings > Secrets and variables > Actions > Variables." >&2
            exit 1
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ steps.base_sha.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        # Username is a non-secret variable; only the token is a secret.
        if: inputs.push == true
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          platforms: ${{ env.TARGET_PLATFORMS }}
          push: ${{ inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:buildcache
          cache-to: ${{ inputs.push == true && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.BASE_IMAGE_NAME) || '' }}
