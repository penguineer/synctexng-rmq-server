name: Docker Base Image

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  BASE_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/synctexng-rmq-server-base
  TARGET_PLATFORMS: linux/amd64 #,linux/arm64,linux/arm/v7

jobs:
  docker-base:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: inputs.push == true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          platforms: ${{ env.TARGET_PLATFORMS }}
          push: ${{ inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:buildcache
          cache-to: ${{ inputs.push == true && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.BASE_IMAGE_NAME) || '' }}
